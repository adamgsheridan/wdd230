<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Website to fill out a form.</title>
    <meta name="description" content="This will be the form that the user can fill out.">
    <meta name="author" content="Adam Sheridan">
    <link rel="icon" type="image/x-icon" href="images/icon-1.webp">
    <meta property="og:title" content="Join form">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/Rexburgtemple.jpg">
    <meta property="og:url" content="https://adamgsheridan.github.io/wdd230/">
    <link href="styles/base.css" rel="stylesheet">
    <link href="styles/medium.css" rel="stylesheet">
    <link href="styles/larger.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="light-body">
    <nav>
        <div class="topnav">
            <a href="index.html">Home</a>
            <div id="myLinks">
                <a href="discover.html">Discover</a>
                <a href="#">Directory</a>
                <a href="join.html">Join</a>
            </div>
            <a href="javascript:void(0);" class="icon" onclick="toggleBars()">
                <i class="fa fa-bars"></i>
            </a>
        </div>
        <script src="scripts/hamburgerMenu.js"></script>
    </nav>

    <main>
        <!--
            An input element of type (hidden) with a name and id. This field contains the current date/time in millisecond format Date.now(), 
            which records the date and time that the form was loaded by the user. You must use JavaScript to set the value of this field.
        -->
        <form method="get" action="thankyou.html">
            <fieldset>
                <legend>Fill out information to join:</legend>
                <div class="info"><h1>Personal Information</h1></div>
                <label class="top">First Name:<input type="text" id="fname" name="fname" required></label>
                <label class="top">Last Name:<input type="text" id="lname" name="lname" required></label>
                <label class="top">Title within your organization:<input type="text" id="position" name="position" pattern="[A-Za-z -]{7,}" required></label>
                <label class="top">Email:<input type="email" id="email" name="email" placeholder="someone@email.com" pattern="[a-zA-Z0-9._%+-]+@byui\.edu$" required></label>
                <label class="top">Phone Number:<input type="tel" id="phone" name="phone" required></label>

                <div class="info"><h1>Business Information</h1></div>
                <label class="top">Organization Name:<input type="text" id="organization" name="organization" required></label>
                <div>Membership Level</div>
                <label class="membership"><input type="radio" name="level" value="npmembership">NP Membership</label>
                <label class="membership"><input type="radio" name="level" value="bronze">Bronze Membership</label>
                <label class="membership"><input type="radio" name="level" value="silver">Silver Membership</label>
                <label class="membership"><input type="radio" name="level" value="gold">Gold Membership</label>
                <br>
                <p>Organization Description:</p>
                <textarea class="top" name="orgdescript" id="orgdescript"></textarea>
                <input type="hidden" id="hidden" value="date">
                <script src="scripts/getCurrentDate.js"></script>
                <br>
                <br>
                <input type="submit" class="submitBtn" value="Submit Information">
            </fieldset>
        </form>
    </main>
    <footer>
        <div class="light-footer">
            <p>Adam Sheridan</p>
            <p>Project for WDD 230</p>
            <p id="lastModified"></p>
        </div>
    </footer>
    <script src="scripts/getDates.js"></script>
    </div>
</body>
</html>
