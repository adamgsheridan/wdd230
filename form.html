<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Webpage for WDD230</title>
    <meta name="description" content="This website will contain the form that users will submit regarding their accoount information.">
    <meta name="author" content="Adam Sheridan">
    <link href="styles/base.css" rel="stylesheet">
    <link href="styles/hamburgerMenu.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="styles/form.css" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="topnav">
            <a href="https://adamgsheridan.github.io/wdd230/">Home</a>
            <div id="myLinks">
                <a href="lesson03/chamber-site-plan.html">Site Plan</a>
                <a href="chamber/index.html">Chamber</a>
                <a href="https://www.byui.edu/" target="_blank">BYU-Idaho</a>
                <a href="https://www.churchofjesuschrist.org/study/scriptures/bofm/alma/7?lang=eng"
                    target="_blank">Scripture</a>
            </div>
            <a href="javascript:void(0);" class="icon" onclick="toggleBars()">
                <i class="fa fa-bars"></i>
            </a>
        </div>
        <script src="scripts/hamburgerMenu.js"></script>
    </nav>
    <main>
        <form method="get" action="index.html">
            <fieldset>
                <legend>Enter Information:</legend>
                <label class="top">Username:<input type="text" name="username" required></label>
                <label class="top">Password:<input type="password" name="password" pattern="[A-Za-z0-9]{8}" required></label>
                <label class="top">Password (For Confirmation):<input type="password" name="passwordconfirmation" pattern="[A-Za-z0-9]{8}" required></label>
                <label class="top">Email:<input type="email" name="email" placeholder="someone@email.com" pattern="[a-zA-Z0-9._%+-]+@byui\.edu$" required></label>
                <label class="top">Page Rating:<input type="range" name="rating"></label>
                <input type="submit" class="submitBtn" value="Submit Information">
            </fieldset>
        </form>
    </main>
    <footer>
        &copy;<span id="currentYear"></span><br>Adam Sheridan<br>United States of America
        <div id="lastModified"></div>
    </footer>
    <script src="scripts/getDates.js"></script>
</body>
</html>
