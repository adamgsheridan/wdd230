<body>
    <nav>
        <div class="topnav">

    <form>
        <h1></h1>
        <form method="get" action="index.html">
            <fieldset>
                <legend>Enter Information:</legend>
                <label class="top">Username:<input type="text" name="username" required></label>
                <label class="top">Password:<input type="text" name="password" required></label>
                <label class="top">Password (For Confirmation):<input type="text" name="passwordconfirmation" required></label>
                <label class="top">Email:<input type="text" name="email" placeholder="someone@email.com" required></label>
                <label class="top">Page Rating:<input type="text" name="rating" placeholder="number between 1 and 10" required></label>
                <input type="submit" class="submitBtn" value="Submit Information">
            </fieldset>
        </form>

    </form>
